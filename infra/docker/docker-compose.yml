services:
  api:
    image: node:22-bookworm
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm dev:api"
    env_file:
      - ../../.env
    environment:
      DATABASE_PATH: /workspace/data/jarvis.sqlite
      ML_WORKER_URL: http://ml-worker:8001
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
      - jarvis-data:/workspace/data
    depends_on:
      - ml-worker

  web:
    image: node:22-bookworm
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm dev:web"
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
    depends_on:
      - api

  ml-worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    working_dir: /workspace
    command: uv run --project workers/ml uvicorn app.main:app --host 0.0.0.0 --port 8001
    env_file:
      - ../../.env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8001:8001"
    volumes:
      - ../..:/workspace

volumes:
  jarvis-data:
