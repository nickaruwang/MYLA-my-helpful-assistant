services:
  api:
    image: node:22-bookworm
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm dev:api"
    env_file:
      - ../../.env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      QDRANT_URL: http://qdrant:6333
      ML_WORKER_URL: http://ml-worker:8001
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
      - myla-data:/workspace/data
    depends_on:
      - ml-worker
      - mongo
      - qdrant

  web:
    image: node:22-bookworm
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm dev:web"
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
    depends_on:
      - api

  ml-worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    working_dir: /workspace
    command: uv run --project workers/ml uvicorn app.main:app --host 0.0.0.0 --port 8001
    env_file:
      - ../../.env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8001:8001"
    volumes:
      - ../..:/workspace

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - myla-mongo:/data/db

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - myla-qdrant:/qdrant/storage

volumes:
  myla-data:
  myla-mongo:
  myla-qdrant:
